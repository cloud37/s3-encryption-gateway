# Chart Releaser Configuration
# See: https://github.com/helm/chart-releaser/blob/main/README.md#configuration

# GitHub repository settings
owner: cloud37
repo: s3-encryption-gateway

# Chart directory
path: helm

# GitHub Pages settings
pages-branch: gh-pages
pages-index-path: index.yaml

# Release settings
charts-repo-url: https://github.com/cloud37/s3-encryption-gateway/releases/download
release-name-template: "{{ .Name }}-{{ .Version }}"

# Options
# NOTE: `prerelease` is not a valid cr option and was silently ignored.
# Prerelease status is now set explicitly via `gh release edit` in the
# helm.yml workflow when the chart version contains a pre-release suffix
# (e.g. -rc*, -alpha*, -beta*).
debug: true
