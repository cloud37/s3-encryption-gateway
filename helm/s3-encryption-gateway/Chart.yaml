apiVersion: v2
name: s3-encryption-gateway
description: A Helm chart for S3 Encryption Gateway - a transparent proxy providing client-side encryption for S3-compatible storage services
keywords:
  - s3
  - encryption
  - gateway
  - storage
home: https://github.com/cloud37/s3-encryption-gateway
sources:
  - https://github.com/cloud37/s3-encryption-gateway
maintainers:
  - name: kenchrcum
    url: https://github.com/kenchrcum
type: application
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/prerelease: "false"
  artifacthub.io/signKey: |
    fingerprint: keyless
    url: https://github.com/cloud37/s3-encryption-gateway
  artifacthub.io/images: |
    - name: s3-encryption-gateway
      image: docker.io/cloud37io/s3-encryption-gateway:0.11.2
      whitelisted: true
    - name: s3-encryption-gateway-fips
      image: docker.io/cloud37io/s3-encryption-gateway:0.11.2-fips
      whitelisted: true
  artifacthub.io/changes: |
    - kind: added
      description: Multi-arch images (linux/amd64, linux/arm64) published to Docker Hub
    - kind: added
      description: SLSA provenance and SBOM attestations via cosign keyless signing
    - kind: added
      description: Artifact Hub listing with full metadata and image references
  artifacthub.io/containsSecurityUpdates: "false"
version: 0.11.2
appVersion: "0.11.2"
dependencies:
  # Valkey subchart for encrypted multipart upload state (V0.6-SEC-3 / ADR-0009).
  # Enabled when `encryptMultipartUploads` is set on any bucket policy;
  # otherwise leave disabled. Uses the community Valkey chart at
  # https://valkey.io/valkey-helm/ (package `valkey/valkey` on Artifact Hub).
  # Chosen over Bitnami because Bitnami's catalog moved to a commercial
  # license model; this chart is Apache-2.0 + verified publisher.
  - name: valkey
    version: "~0.10.0"
    repository: https://valkey.io/valkey-helm/
    condition: valkey.enabled
