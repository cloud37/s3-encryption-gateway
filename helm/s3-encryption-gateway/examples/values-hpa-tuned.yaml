# V1.0-PERF-1 — Tuned HPA overlay derived from empirical spike-profile data.
#
# Apply as a third overlay after values.yaml and values.prod.yaml:
#
#   helm install s3gw helm/s3-encryption-gateway \
#     -f helm/s3-encryption-gateway/values.yaml \
#     -f helm/s3-encryption-gateway/values.prod.yaml \
#     -f helm/s3-encryption-gateway/examples/values-hpa-tuned.yaml
#
# Design rationale (see docs/SCALING.md §4.1 for detail):
#   - targetCPU: 60% provides 10pp headroom before 70% memory target,
#     reducing request queuing during scale-out latency.
#   - scaleUp stabilizationWindow: 15s (vs 0s in defaults) allows faster
#     reaction to spike traffic while avoiding flap.
#   - scaleDown: 25%/min (vs 50%/min in defaults) protects against
#     oscillation under bursty workloads.
#   - terminationGracePeriodSeconds: 120s covers p99 upload duration for
#     50 MiB parts + 15s preStop sleep + 15s kube-proxy propagation tail.

autoscaling:
  enabled: true
  minReplicas: 2        # Never below 2 for HA
  maxReplicas: 20       # Sized for 10× baseline traffic
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25            # max 25% pods removed per minute — conservative
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15   # fast scale-up for spike profiles
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2       # Always keep 2 pods during node drain

# Graceful shutdown: 120s = p99 part upload (~90s for 50 MiB @ 10 MiB/s)
#                        + 15s preStop sleep
#                        + 15s kube-proxy propagation tail
terminationGracePeriodSeconds: 120
lifecycle:
  preStop:
    exec:
      command: ["sh", "-c", "sleep 15"]
